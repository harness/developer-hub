      "ColumnDefinition": {
        "type": "object",
        "description": "Definition of a column including its type and validation constraints",
        "properties": {
          "name": {
            "type": "string",
            "description": "Column name",
            "example": "team",
            "maxLength": 128,
            "minLength": 0,
            "pattern": "^[a-z][a-z0-9_]*$"
          },
          "type": {
            "type": "string",
            "description": "Column data type (string, number, boolean, timestamp)",
            "enum": [
              "string",
              "double",
              "long",
              "timestamp",
              "boolean",
              "json"
            ],
            "example": "string"
          },
          "required": {
            "type": "boolean",
            "description": "Whether this column is required in every record"
          },
          "description": {
            "type": "string",
            "description": "Human-readable description of the column",
            "maxLength": 500,
            "minLength": 0
          },
          "unit": {
            "type": "string",
            "description": "Unit of measurement (e.g., ms, seconds, percentage)"
          },
          "allowedValues": {
            "type": "array",
            "description": "List of allowed values (enum constraint)",
            "items": {
              "type": "string"
            }
          },
          "pattern": {
            "type": "string",
            "description": "Regex pattern for value validation",
            "maxLength": 500,
            "minLength": 0
          },
          "min": {
            "type": "number",
            "format": "double",
            "description": "Minimum allowed value (for numeric fields)"
          },
          "max": {
            "type": "number",
            "format": "double",
            "description": "Maximum allowed value (for numeric fields)"
          },
          "requiredColumns": {
            "type": "array",
            "description": "List of other columns that must be present when this column is used",
            "items": {
              "type": "string"
            }
          }
        },
        "required": [
          "name",
          "type"
        ]
      },
