    "/v2/insights/coding-assistant/rework/summary": {
      "post": {
        "tags": [
          "AI Coding Assistant Insights"
        ],
        "summary": "Get AI Rework correlation analytics",
        "description": "Analyzes the correlation between AI coding assistant usage (Cursor/Windsurf) and code rework patterns.\n\n**Key Metrics:**\n- `reworkPercentPerDeveloper` - Average rework percentage per developer\n- `totalReworkLoc` - Total lines of reworked code\n- `totalLoc` - Total lines of code changed\n- `trendPercentage` - Percentage change from previous period\n\n**Rework Calculation:**\nBased on productivity v4 rework logic:\n- Legacy Rework: Changes to code modified ≥30 days ago\n- Recent Rework: Changes to code modified \u003C30 days ago\n- Rework Amount: LEAST(additions, deletions) for files with both adds and deletes\n\n**User Categories:**\n- Single Integration: active, inactive, unassigned users\n- Multi Integration: cursor_active, windsurf_active, combined_active, no_ai_tool\n\n**Response Structure:**\nReturns metrics breakdown by AI tool adoption status with trend analysis comparing current vs previous period.\n",
        "operationId": "AIInsightsControllerGetReworkSummary",
        "parameters": [
          {
            "name": "projectIdentifier",
            "in": "query",
            "description": "Project identifier",
            "required": true,
            "schema": {
              "type": "string"
            },
            "example": "proj_123"
          },
          {
            "name": "orgIdentifier",
            "in": "query",
