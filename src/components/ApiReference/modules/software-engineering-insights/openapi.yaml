                "schema": {
                  "$ref": "#/components/schemas/GroupedTeamFiltersResponseDTO"
                }
              }
            }
          },
          "200": {
            "description": "Filters retrieved successfully",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/GroupedTeamFiltersResponseDTO"
                }
              }
            }
          }
        }
