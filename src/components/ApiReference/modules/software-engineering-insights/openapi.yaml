            "schema": {
              "type": "integer",
              "format": "int32"
            }
          },
          {
            "name": "integrationType",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "IM",
                "SCM",
                "CI",
                "CD",
                "ITSM",
                "SECURITY",
