        "tags": [
          "teams-controller"
        ],
        "summary": "Get team integration filters",
        "description": "Returns filters for the specified team, grouped by integration type. If a specific integrationType is provided in the request, the response will include filters for that type. If no integrationType is provided, it will include filters for all integration types.",
