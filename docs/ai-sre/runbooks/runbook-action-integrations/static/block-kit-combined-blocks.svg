<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <!-- Background -->
  <rect width="800" height="320" fill="#f8f9fa"/>

  <!-- Slack message container -->
  <rect x="40" y="20" width="720" height="280" rx="8" fill="#ffffff" stroke="#e1e4e8" stroke-width="1"/>

  <!-- Avatar circle -->
  <circle cx="70" cy="50" r="20" fill="#611f69"/>
  <text x="70" y="56" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">H</text>

  <!-- Bot label -->
  <rect x="100" y="36" width="35" height="16" rx="3" fill="#e1e4e8"/>
  <text x="117.5" y="47" font-family="Arial, sans-serif" font-size="10" fill="#616061" text-anchor="middle">APP</text>

  <!-- Message header -->
  <text x="100" y="52" font-family="Arial, sans-serif" font-size="14" fill="#1d1c1d" font-weight="bold">Harness AI SRE</text>
  <text x="215" y="52" font-family="Arial, sans-serif" font-size="12" fill="#616061">9:15 AM</text>

  <!-- Section Block 1 - Alert header -->
  <text x="100" y="85" font-family="Arial, sans-serif" font-size="15" fill="#1d1c1d" font-weight="bold">🚨 New SEV1 Incident Detected</text>
  <text x="700" y="85" font-family="Arial, sans-serif" font-size="10" fill="#868686">← Section</text>

  <!-- Section Block 2 - Details -->
  <text x="100" y="118" font-family="Arial, sans-serif" font-size="15" fill="#1d1c1d" font-weight="bold">Title:</text>
  <text x="145" y="118" font-family="Arial, sans-serif" font-size="15" fill="#1d1c1d">Database Connection Failure</text>

  <text x="100" y="141" font-family="Arial, sans-serif" font-size="15" fill="#1d1c1d" font-weight="bold">Status:</text>
  <text x="155" y="141" font-family="Arial, sans-serif" font-size="15" fill="#1d1c1d">Investigating</text>

  <text x="100" y="164" font-family="Arial, sans-serif" font-size="15" fill="#1d1c1d" font-weight="bold">Summary:</text>
  <text x="175" y="164" font-family="Arial, sans-serif" font-size="15" fill="#1d1c1d">Primary database unresponsive</text>
  <text x="700" y="141" font-family="Arial, sans-serif" font-size="10" fill="#868686">← Section</text>

  <!-- Divider line -->
  <line x1="100" y1="185" x2="700" y2="185" stroke="#e1e4e8" stroke-width="1"/>

  <!-- Context Block - Supplementary info -->
  <text x="100" y="215" font-family="Arial, sans-serif" font-size="13" fill="#616061">👉 View full incident details: </text>
  <text x="310" y="215" font-family="Arial, sans-serif" font-size="13" fill="#1264a3" text-decoration="underline">Incident INC-12345</text>
  <text x="700" y="215" font-family="Arial, sans-serif" font-size="10" fill="#868686">← Context</text>

  <!-- Visual hierarchy annotation -->
  <rect x="100" y="245" width="600" height="40" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="115" y="262" font-family="Arial, sans-serif" font-size="12" fill="#856404" font-weight="bold">Visual Hierarchy:</text>
  <text x="115" y="278" font-family="Arial, sans-serif" font-size="11" fill="#856404">Section blocks (black, larger) for primary content | Context blocks (gray, smaller) for metadata</text>
</svg>
